<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rahul Property Hub</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
}

/* Header */
header {
    background: #1a1a2e;
    color: white;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
}

nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
}

/* Hero */
.hero {
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1560185127-6ed189bf02f4') center/cover;
    height: 400px;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
}

.hero button {
    padding: 10px 20px;
    background: #00adb5;
    border: none;
    color: white;
}

/* Section */
.section {
    padding: 30px;
    text-align: center;
}

/* Properties */
.properties {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    width: 260px;
    margin: 15px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
}

/* Form */
input {
    padding: 10px;
    margin: 5px;
    width: 220px;
}

button {
    padding: 10px 20px;
    background: #00adb5;
    color: white;
    border: none;
}

/* WhatsApp */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 12px 18px;
    border-radius: 50px;
    text-decoration: none;
}

/* Footer */
footer {
    background: #1a1a2e;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>
</head>

<body>

<header>
    <h2>Rahul Property Hub</h2>
    <nav>
        <a href="#">Home</a>
        <a href="#">Properties</a>
        <a href="#">Contact</a>
    </nav>
</header>

<div class="hero">
    <h1>Find Your Dream Home</h1>
    <p>Buy | Sell | Rent Easily</p>
    <button>Contact Now</button>
</div>

<div class="section">
    <h2>Featured Properties</h2>
    <div class="properties" id="propertyList">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1572120360610-d971b9b78825">
            <h3>2 BHK Flat</h3>
            <p>Mumbai - ₹50 Lakhs</p>
        </div>

    </div>
</div>

<!-- Contact Form -->
<div class="section">
    <h2>Contact Us</h2>
    <input type="text" placeholder="Your Name"><br>
    <input type="tel" placeholder="Mobile Number"><br>
    <button>Submit</button>
</div>

<!-- Admin Panel -->
<div class="section">
    <h2>Add Property (Admin)</h2>

    <input type="text" id="title" placeholder="Property Name"><br>
    <input type="text" id="price" placeholder="Price"><br>
    <input type="text" id="location" placeholder="Location"><br>
    <input type="text" id="image" placeholder="Image URL"><br>

    <button onclick="addProperty()">Add Property</button>
</div>

<!-- WhatsApp -->
<a href="https://wa.me/918459745489" target="_blank" class="whatsapp">
    WhatsApp
</a>

<footer>
    <p>📞 +91 8459745489</p>
    <p>© 2026 Rahul Property Hub</p>
</footer>

<script>
function addProperty() {
    let title = document.getElementById("title").value;
    let price = document.getElementById("price").value;
    let location = document.getElementById("location").value;
    let image = document.getElementById("image").value;

    let html = `
    <div class="card">
        <img src="${image}">
        <h3>${title}</h3>
        <p>${location} - ${price}</p>
    </div>
    `;

    document.getElementById("propertyList").innerHTML += html;
}
</script>

</body>
</html>
